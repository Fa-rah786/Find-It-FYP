<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Find It!</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
background: url('login.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Poppins', sans-serif;}
    .navbar-background color: 007bff;
    
    .navbar-brand, .nav-link {
      color: white !important;
    }
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .btn-primary {
      width: 100%;
    }
    .footer-text {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- 🌐 NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html"><b>Find It!</b></a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="report_lost.html">Report Lost</a></li>
          <li class="nav-item"><a class="nav-link" href="report_found.html">Report Found</a></li>
          <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 🔐 LOGIN FORM -->
  <div class="login-container">
    <h3 class="text-center mb-4 text-primary">Login to Find It!</h3>
    <form>
      <!-- Email or Phone -->
      <div class="mb-3">
        <label for="emailOrPhone" class="form-label">Email or Phone Number</label>
        <input type="text" class="form-control" id="emailOrPhone" placeholder="Enter email or phone">
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter password">
      </div>

      <!-- Login Button -->
      <button type="submit" class="btn btn-primary">Login</button>

      <!-- Signup Link -->
      <p class="footer-text">
        Don’t have an account? <a href="signup.html" class="text-primary">Sign up</a>
      </p>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
