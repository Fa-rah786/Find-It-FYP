<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Find It!</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f5f7fa;
    }
    .sidebar {
      height: 100vh;
      background-color: #007bff;
      color: white;
      padding: 20px 10px;
      position: fixed;
      width: 220px;
    }
    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: bold;
    }
    .sidebar a {
      color: white;
      display: block;
      padding: 10px;
      border-radius: 8px;
      text-decoration: none;
      margin-bottom: 10px;
    }
    .sidebar a:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }
    .main-content {
      margin-left: 240px;
      padding: 20px;
    }
    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .navbar {
      background-color: #fff;
      border-bottom: 1px solid #ddd;
    }
    .navbar-brand {
      font-weight: bold;
      color: #007bff !important;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>Admin Panel</h2>
    <a href="admin_dashboard.html">Dashboard</a>
    <a href="#">View Lost Items</a>
    <a href="#">View Found Items</a>
    <a href="#">Manage Users</a>
    <a href="#">Messages</a>
    <a href="home.html">Logout</a>
  </div>

  <div class="main-content">
    <nav class="navbar navbar-light mb-4">
      <div class="container-fluid">
        <a class="navbar-brand">Find It! - Admin Dashboard</a>
      </div>
    </nav>

    <!-- Summary Cards -->
    <div class="row">
      <div class="col-md-4 mb-3">
        <div class="card p-3 text-center">
          <h5>Total Lost Reports</h5>
          <h3>25</h3>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <div class="card p-3 text-center">
          <h5>Total Found Reports</h5>
          <h3>18</h3>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <div class="card p-3 text-center">
          <h5>Registered Users</h5>
          <h3>40</h3>
        </div>
      </div>
    </div>

    <!-- Reports Table -->
    <div class="card mt-4">
      <div class="card-body">
        <h5 class="mb-3">Recent Reports</h5>
        <table class="table table-striped">
          <thead>
            <tr>
              <th>#</th>
              <th>Type</th>
              <th>Item Name</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>Lost</td>
              <td>Wallet</td>
              <td><span class="badge bg-warning">Pending</span></td>
              <td>03-Nov-2025</td>
            </tr>
            <tr>
              <td>2</td>
              <td>Found</td>
              <td>Phone</td>
              <td><span class="badge bg-success">Matched</span></td>
              <td>02-Nov-2025</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
