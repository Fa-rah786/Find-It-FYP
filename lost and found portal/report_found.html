<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Found Item | Find It!</title>

  <!-- ✅ Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
  body {
    background: url('report.bg.jpg') no-repeat center center fixed;
    background-size: cover;
  }

  /* Keep form readable over background */
  form {
    background: rgba(255, 255, 255, 0.9) !important;
  }
</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Find It!</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="report_lost.html">Report Lost Item</a></li>
          <li class="nav-item"><a class="nav-link active" href="report_found.html">Report Found Item</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 🧾 Found Item Form -->
  <div class="container mt-5 mb-5">
    <h2 class="text-center text-primary mb-4">Report a Found Item</h2>

    <form class="w-75 mx-auto p-4 shadow rounded bg-light">
      <!-- 🔹 Item Name -->
      <div class="mb-3">
        <label for="itemName" class="form-label fw-bold">Item Name</label>
        <input type="text" class="form-control" id="itemName" placeholder="e.g. Wallet, Phone, ID Card">
      </div>

      <!-- 🔹 Description -->
      <div class="mb-3">
        <label for="description" class="form-label fw-bold">Description</label>
        <textarea class="form-control" id="description" rows="3" placeholder="Write short details about the found item..."></textarea>
      </div>

      <!-- 🔹 Found Location -->
      <div class="mb-3">
        <label for="location" class="form-label fw-bold">Found Location</label>
        <input type="text" class="form-control" id="location" placeholder="e.g. Near Library, Canteen, Parking Area">
      </div>

      <!-- 🔹 Date Found -->
      <div class="mb-3">
        <label for="date" class="form-label fw-bold">Date Found</label>
        <input type="date" class="form-control" id="date">
      </div>

      <!-- 🔹 Contact Info -->
      <div class="mb-3">
        <label for="contact" class="form-label fw-bold">Contact Number / Email</label>
        <input type="text" class="form-control" id="contact" placeholder="Enter your contact details">
      </div>

      <!-- 🟢 Submit Button -->
      <div class="text-center">
        <button type="submit" class="btn btn-success px-5">Submit</button>
      </div>
    </form>
  </div>

  <!-- 🦶 Footer -->
  <footer class="bg-primary text-white text-center p-3">
    <p>© 2025 Find It! | All Rights Reserved</p>
  </footer>

  <!-- ✅ Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
